<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Funtime Photography – Event Gallery</title>
<meta name="description" content="Browse Funtime Photography's event gallery featuring RAWfest, Dedbest, and Taco Night events.">
<meta property="og:title" content="Funtime Photography – Event Gallery">
<meta property="og:description" content="Browse professional event photography from Funtime Photography">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
  --bg-a:#2b1a4a;
  --bg-b:#1b0f2e;
  --bg-c:#0d0617;
  --accent:#00e0ff;
  --panel:rgba(255,255,255,0.06);
  --text-main:#f5f5fa;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Montserrat,sans-serif;
  background:radial-gradient(circle at 20% 20%,var(--bg-a),var(--bg-b) 55%,var(--bg-c));
  color:var(--text-main);
}

/* NAV */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:14px 30px;
  background:rgba(10,6,23,0.75);
  z-index:999;
}

.topbar img{width:60px;height:60px;border-radius:50%;object-fit:cover}

.topbar a{
  font-family:'Bebas Neue';
  color:white;
  text-decoration:none;
  margin-left:20px;
  transition:.3s;
}

.topbar a:hover{
  color:var(--accent);
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:100px auto;
  padding:0 20px;
}

/* ✅ TILES NAV */
.tiles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:30px;
}

.tile{
  height:140px;
  border-radius:14px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:flex-end;
  padding:15px;
  transition:.3s;
  background-size:cover;
  background-position:center;
  border:none;
  background-color:transparent;
}

.tile::before{
  content:"";
  position:absolute;
  inset:0;
  background-color:rgba(0,0,0,0.5);
  transition:.3s;
}

.tile:hover::before{
  background-color:rgba(0,0,0,0.3);
  transform:scale(1.05);
}

.tile:focus{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

.tile span{
  font-family:'Bebas Neue';
  font-size:28px;
  position:relative;
  z-index:2;
  color:var(--text-main);
}

.tile.active{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

/* ✅ SECTION */
.section{
  opacity:0;
  transform:translateY(30px);
  transition:.5s;
  display:none;
}

.section.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* ✅ HEADER */
.section-header{
  height:180px;
  width:100%;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
  display:flex;
  align-items:flex-end;
  padding:20px;
  position:relative;
  background-size:cover;
  background-position:center;
}

.section-header::before{
  content:"";
  position:absolute;
  inset:0;
  background-color:rgba(0,0,0,0.5);
}

.section-header h2{
  font-family:'Bebas Neue';
  font-size:42px;
  position:relative;
  z-index:2;
}

/* ✅ GRID */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
}

.thumb{
  position:relative;
  overflow:hidden;
  border-radius:10px;
  aspect-ratio:1;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
  transition:.3s;
  display:block;
}

.thumb img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.lightbox.active{
  display:flex;
}

.lightbox img{
  max-width:90%;
  max-height:85vh;
  border-radius:10px;
  object-fit:contain;
}

.lightbox::after{
  content:"Press ESC to close";
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:var(--text-main);
  font-size:12px;
  opacity:0.6;
}

</style>
</head>

<body>

<header class="topbar">
<img src="/logo.png" alt="Funtime Photography logo">
<div>
<a href="/index.html">Home</a>
<a href="#contact">Contact</a>
</div>
</header>

<main class="container">

<!-- ✅ VISUAL TILES -->
<div class="tiles" id="tiles"></div>

<!-- ✅ GALLERIES -->
<div id="eventsContainer"></div>

</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
<img id="lightbox-img" alt="Full size event photo">
</div>

<script>
(function(){

// ✅ CONFIGURATION CONSTANTS
const BATCH_SIZE = 12;
const OBSERVER_THRESHOLD = 0.2;
const IMAGE_BASE_PATH = '/';

const events = [
  { id:'rawfest', name:'RAWfest', from:1, to:50 },
  { id:'dedbest', name:'Dedbest', from:74, to:134 },
  { id:'taco', name:'Taco Night', from:135, to:243 }
];

const container = document.getElementById('eventsContainer');
const tilesWrap = document.getElementById('tiles');
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');

const sections = {};

/* ✅ VALIDATE PHOTO INDEX */
function isValidPhotoIndex(index) {
  return Number.isInteger(index) && index > 0;
}

/* ✅ CREATE TILES + SECTIONS */
events.forEach((ev) => {

  // TILE
  const tile = document.createElement('button');
  tile.className = 'tile';
  tile.setAttribute('data-event-id', ev.id);
  tile.setAttribute('aria-label', `View ${ev.name} gallery`);
  tile.innerHTML = `<span>${ev.name}</span>`;
  tile.style.backgroundImage = `url('${IMAGE_BASE_PATH}photo${ev.from}.jpg')`;

  tilesWrap.appendChild(tile);

  // SECTION
  const section = document.createElement('div');
  section.className = 'section';
  section.setAttribute('data-event-id', ev.id);

  section.innerHTML = `
    <div class="section-header" style="background-image:url('${IMAGE_BASE_PATH}photo${ev.from}.jpg')">
      <h2>${ev.name}</h2>
    </div>
    <div class="gallery" role="region" aria-label="${ev.name} photo gallery"></div>
  `;

  container.appendChild(section);

  sections[ev.id] = {
    el: section,
    tile: tile,
    ev: ev,
    loaded: 0
  };

  // CLICK & KEYBOARD
  tile.addEventListener('click', () => {
    switchGallery(ev.id);
  });

  tile.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      switchGallery(ev.id);
    }
  });

});

/* ✅ SWITCH FUNCTION */
function switchGallery(id) {

  Object.values(sections).forEach(s => {
    s.el.classList.remove('active');
    s.tile.classList.remove('active');
  });

  const s = sections[id];
  s.el.classList.add('active');
  s.tile.classList.add('active');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ✅ LOAD IMAGES */
function loadMore(sectionObj) {

  const { ev } = sectionObj;
  const gallery = sectionObj.el.querySelector('.gallery');

  for (let i = 0; i < BATCH_SIZE; i++) {

    const index = ev.from + sectionObj.loaded;
    if (index > ev.to) return;

    if (!isValidPhotoIndex(index)) {
      console.warn(`Invalid photo index: ${index}`);
      sectionObj.loaded++;
      continue;
    }

    const img = document.createElement('img');
    img.src = `${IMAGE_BASE_PATH}photo${index}.jpg`;
    img.alt = `Photo ${index} from ${ev.name}`;
    img.loading = 'lazy';
    img.width = 250;
    img.height = 250;

    const wrap = document.createElement('div');
    wrap.className = 'thumb';
    wrap.appendChild(img);

    gallery.appendChild(wrap);

    sectionObj.loaded++;
  }
}

/* ✅ OBSERVER - Single loading mechanism */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const sectionObj = Object.values(sections).find(s => s.el === entry.target);
      if (sectionObj && sectionObj.loaded < (sectionObj.ev.to - sectionObj.ev.from + 1)) {
        loadMore(sectionObj);
      }
    }
  });
}, { threshold: OBSERVER_THRESHOLD });

Object.values(sections).forEach(s => {
  observer.observe(s.el);
});

/* ✅ LIGHTBOX */
document.addEventListener('click', e => {
  const img = e.target.closest('.thumb img');
  if (!img) return;

  lbImg.src = img.src;
  lbImg.alt = img.alt;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
});

lb.addEventListener('click', () => {
  lb.classList.remove('active');
  document.body.style.overflow = '';
});

// Close lightbox with ESC key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && lb.classList.contains('active')) {
    lb.classList.remove('active');
    document.body.style.overflow = '';
  }
});

/* ✅ DEFAULT LOAD */
switchGallery(events[0].id);

})();
</script>

</body>
</html>
