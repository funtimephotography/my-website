<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Funtime Photography – Event Gallery</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-a:#2b1a4a;
      --bg-b:#1b0f2e;
      --bg-c:#0d0617;
      --accent:#00e0ff;
      --panel:rgba(255,255,255,0.06);
      --text-main:#f5f5fa;
      --text-muted:rgba(245,245,250,0.6);
      --max-width:1200px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Montserrat,system-ui,sans-serif;
      background:radial-gradient(circle at 20% 20%,var(--bg-a),var(--bg-b) 55%,var(--bg-c));
      color:var(--text-main);
      overflow-x:hidden;
    }

    /* Topbar */
    .topbar{
      position:fixed;
      top:0;left:0;right:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 30px;
      background:rgba(10,6,23,0.75);
      backdrop-filter:blur(10px);
      z-index:1000;
    }
    .topbar img{width:60px;height:60px;border-radius:50%}
    .topbar nav a{
      font-family:'Bebas Neue',sans-serif;
      letter-spacing:2px;
      text-transform:uppercase;
      color:var(--text-main);
      text-decoration:none;
      margin:0 14px;
      font-size:18px;
    }
    .topbar nav a:hover{color:var(--accent)}

    .container{
      max-width:var(--max-width);
      margin:96px auto 40px;
      padding:0 20px;
    }

    /* Filters */
    .controls{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }
    .filter-btn{
      background:var(--panel);
      border:0;
      padding:10px 16px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      color:var(--text-main);
      backdrop-filter:blur(6px);
    }
    .filter-btn.active{
      background:linear-gradient(135deg,var(--accent),#007d96);
      color:#001417;
    }

    /* Event sections */
    .section{
      margin-bottom:32px;
      background:var(--panel);
      backdrop-filter:blur(6px);
      border-radius:16px;
      padding:16px;
    }
    .section-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
    .section-title{
      font-family:'Bebas Neue',sans-serif;
      letter-spacing:1.5px;
      font-size:1.3rem;
    }
    .toggle-btn{
      background:none;
    }
    .toggle-btn{
      border:0;
      color:var(--accent);
      font-weight:700;
      cursor:pointer;
    }

    /* Masonry gallery */
    .gallery{
      column-count:4;
      column-gap:12px;
    }
    .thumb{
      break-inside:avoid;
      margin-bottom:12px;
      border-radius:12px;
      overflow:hidden;
      cursor:pointer;
    }
    .thumb img{
      width:100%;
      display:block;
      transition:.3s;
    }
    .thumb:hover img{
      transform:scale(1.05);
      box-shadow:0 10px 26px rgba(0,0,0,0.6);
    }

    @media(max-width:1200px){.gallery{column-count:3}}
    @media(max-width:900px){.gallery{column-count:2}}
    @media(max-width:600px){
      .gallery{column-count:1}
      .topbar{flex-direction:column}
    }

    /* Lightbox */
    .lightbox{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:9999}
    .lightbox.visible{display:flex}
    .lightbox .backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.92)}
    .lightbox .frame{position:relative;max-width:95%;max-height:95%}
    .lightbox img{max-width:100%;max-height:100%;border-radius:10px}
    .close-btn{
      position:absolute;
      right:-12px;
      top:-12px;
      background:white;
      width:36px;
      height:36px;
      border-radius:50%;
      border:0;
      cursor:pointer;
    }
    .lb-nav{
      position:absolute;
      top:50%;
      left:-60px;
      right:-60px;
      display:flex;
      justify-content:space-between;
      pointer-events:none;
    }
    .lb-nav button{
      pointer-events:auto;
      background:rgba(255,255,255,0.1);
      border:0;
      color:#fff;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header class="topbar">
  <img src="logo.png" alt="Funtime Photography logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<main class="container">

  <div class="controls">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="rawfest">RAWfest</button>
    <button class="filter-btn" data-filter="bonfire">High Hurstwood Bonfire</button>
    <button class="filter-btn" data-filter="dedbest">Dedbest / Elsewhere</button>
    <button class="filter-btn" data-filter="taco">Taco Night</button>
