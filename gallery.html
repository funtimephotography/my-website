<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Funtime Photography – Event Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
  --bg-a:#2b1a4a;
  --bg-b:#1b0f2e;
  --bg-c:#0d0617;
  --accent:#00e0ff;
  --panel:rgba(255,255,255,0.06);
  --text-main:#f5f5fa;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Montserrat,sans-serif;
  background:radial-gradient(circle at 20% 20%,var(--bg-a),var(--bg-b) 55%,var(--bg-c));
  color:var(--text-main);
}

/* NAV */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:14px 30px;
  background:rgba(10,6,23,0.75);
  z-index:999;
}

.topbar img{width:60px;border-radius:50%}

.topbar a{
  font-family:'Bebas Neue';
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:100px auto;
  padding:0 20px;
}

/* ✅ TILES NAV */
.tiles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:30px;
}

.tile{
  height:140px;
  border-radius:14px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:flex-end;
  padding:15px;
  transition:.3s;
}

.tile::before{
  content:"";
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(0.5);
  transition:.3s;
}

.tile:hover::before{
  transform:scale(1.1);
  filter:brightness(0.7);
}

.tile span{
  font-family:'Bebas Neue';
  font-size:28px;
  position:relative;
  z-index:2;
}

.tile.active{
  outline:2px solid var(--accent);
}

/* ✅ SECTION */
.section{
  opacity:0;
  transform:translateY(30px);
  transition:.5s;
  display:none;
}

.section.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* ✅ HEADER */
.section-header{
  height:180px;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
  display:flex;
  align-items:flex-end;
  padding:20px;
  position:relative;
}

.section-header::before{
  content:"";
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(0.5);
}

.section-header h2{
  font-family:'Bebas Neue';
  font-size:42px;
  position:relative;
  z-index:2;
}

/* ✅ GRID */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
}

.thumb img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.thumb img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox.active{display:flex}

.lightbox img{
  max-width:90%;
  max-height:85vh;
  border-radius:10px;
}

</style>
</head>

<body>

<header class="topbar">
<img src="logo.png">
<div>
<a href="index.html">Home</a>
<a href="#contact">Contact</a>
</div>
</header>

<main class="container">

<!-- ✅ VISUAL TILES -->
<div class="tiles" id="tiles"></div>

<!-- ✅ GALLERIES -->
<div id="eventsContainer"></div>

</main>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>
(function(){

const events = [
  { id:'rawfest', name:'RAWfest', from:1, to:50 },
  { id:'dedbest', name:'Dedbest', from:74, to:134 },
  { id:'taco', name:'Taco Night', from:135, to:243 }
];

const container = document.getElementById('eventsContainer');
const tilesWrap = document.getElementById('tiles');

const sections = {};

/* ✅ CREATE TILES + SECTIONS */
events.forEach((ev,i)=>{

  // TILE
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.innerHTML = `<span>${ev.name}</span>`;
  tile.style.setProperty('--bg', `url('photo${ev.from}.jpg')`);
  tile.querySelector('span');

  tile.style.backgroundImage = `url('photo${ev.from}.jpg')`;
  tile.style.position = "relative";
  tile.style.backgroundSize = "cover";
  tile.style.backgroundPosition = "center";

  tilesWrap.appendChild(tile);

  // SECTION
  const section = document.createElement('div');
  section.className = 'section';

  section.innerHTML = `
    <div class="section-header" style="background-image:url('photo${ev.from}.jpg')">
      <h2>${ev.name}</h2>
    </div>
    <div class="gallery"></div>
  `;

  container.appendChild(section);

  sections[ev.id] = {
    el:section,
    tile:tile,
    ev,
    loaded:0
  };

  // CLICK
  tile.onclick = ()=>{
    switchGallery(ev.id);
  };

});

/* ✅ SWITCH FUNCTION */
function switchGallery(id){

  Object.values(sections).forEach(s=>{
    s.el.classList.remove('active');
    s.tile.classList.remove('active');
  });

  const s = sections[id];
  s.el.classList.add('active');
  s.tile.classList.add('active');

  window.scrollTo({top:0,behavior:'smooth'});
}

/* ✅ LOAD IMAGES */
function loadMore(sectionObj){

  const {ev} = sectionObj;
  const gallery = sectionObj.el.querySelector('.gallery');

  const batchSize = 12;

  for(let i=0;i<batchSize;i++){

    const index = ev.from + sectionObj.loaded;
    if(index > ev.to) return;

    const img = document.createElement('img');
    img.src = `photo${index}.jpg`;
    img.loading = "lazy";

    const wrap = document.createElement('div');
    wrap.className = "thumb";
    wrap.appendChild(img);

    gallery.appendChild(wrap);

    sectionObj.loaded++;
  }
}

/* ✅ OBSERVER */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const sectionObj = Object.values(sections).find(s => s.el === entry.target);
      if(sectionObj) loadMore(sectionObj);
    }
  });
},{threshold:0.2});

Object.values(sections).forEach(s=>{
  observer.observe(s.el);
});

/* ✅ SCROLL LOAD */
window.addEventListener('scroll', ()=>{
  Object.values(sections).forEach(s=>{
    if(s.loaded < (s.ev.to - s.ev.from)){
      const rect = s.el.getBoundingClientRect();
      if(rect.bottom < window.innerHeight + 200){
        loadMore(s);
      }
    }
  });
});

/* ✅ LIGHTBOX */
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');

document.addEventListener('click', e=>{
  const img = e.target.closest('.thumb img');
  if(!img) return;

  lbImg.src = img.src;
  lb.classList.add('active');
});

lb.onclick = ()=>lb.classList.remove('active');

/* ✅ DEFAULT LOAD */
switchGallery(events[0].id);

})();
</script>

</body>
</html>
