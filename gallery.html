<script>
(function(){

  const BATCH_SIZE = 20;

  const events = [
    { id:'rawfest', name:'RAWfest', from:1, to:50 },
    { id:'dedbest', name:'Dedbest / Elsewhere', from:74, to:134 },
    { id:'taco', name:'The Hurstwood Taco Night', from:135, to:243 }
  ];

  const container = document.getElementById('eventsContainer');
  const filterBtns = [...document.querySelectorAll('.filter-btn')];
  const sections = {};

  // ✅ OBSERVER (for Netflix scroll)
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting && entry.target.loadMore){
        entry.target.loadMore();
      }
    });
  }, {
    rootMargin: "300px"
  });

  // ✅ BUILD SECTIONS (same structure)
  events.forEach(ev => {

    const section = document.createElement('section');
    section.className = 'section';
    section.dataset.event = ev.id;

    section.innerHTML = `
      <div class="section-title">${ev.name}</div>
      <div class="gallery"></div>
      <div class="sentinel"></div>
    `;

    const gallery = section.querySelector('.gallery');
    const sentinel = section.querySelector('.sentinel');

    let current = ev.from;

    // ✅ LOAD NEXT BATCH
    function loadBatch(){

      if(current > ev.to) return;

      const end = Math.min(current + BATCH_SIZE - 1, ev.to);

      for(let i = current; i <= end; i++){

        const t = document.createElement('div');
        t.className = 'thumb';

        const img = document.createElement('img');

        // ✅ thumbnail
        img.src = `./thumbs/photo${i}.webp`;

        img.alt = `${ev.name} photo ${i}`;
        img.loading = 'lazy';
        img.decoding = 'async';

        t.appendChild(img);
        gallery.appendChild(t);
      }

      current = end + 1;

      // ✅ stop when done
      if(current > ev.to){
        observer.unobserve(sentinel);
      }
    }

    // attach loader to sentinel
    sentinel.loadMore = loadBatch;

    sections[ev.id] = {
      element: section,
      gallery,
      sentinel,
      loadBatch,
      loadedFirst: false
    };

    container.appendChild(section);

    section.style.display = 'none';
  });

  // ✅ FILTERS (folder only)
  filterBtns.forEach(btn => {

    btn.onclick = () => {

      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const selected = btn.dataset.filter;

      Object.entries(sections).forEach(([key, obj]) => {

        if(key === selected){

          obj.element.style.display = 'block';

          // ✅ FIRST LOAD ONLY ON OPEN
          if(!obj.loadedFirst){
            obj.loadBatch();
            obj.loadedFirst = true;
          }

          // ✅ activate scroll loading
          observer.observe(obj.sentinel);

        } else {

          obj.element.style.display = 'none';

          // ✅ STOP watching hidden sections
          observer.unobserve(obj.sentinel);
        }

      });
    };
  });

  // ✅ AUTO OPEN FIRST FOLDER
  if(filterBtns.length){
    filterBtns[0].click();
  }

  // ✅ LIGHTBOX (same + full image swap)
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');

  document.addEventListener('click', e => {

    const img = e.target.closest('.thumb img');
    if(!img) return;

    let fullSrc = img.src;

    if(fullSrc.includes('/thumbs/')){
      fullSrc = fullSrc.replace('/thumbs/', '/').replace('.webp', '.jpg');
    }

    lbImg.src = fullSrc;
    lb.classList.add('visible');
  });

  document.getElementById('lb-close').onclick = () => {
    lb.classList.remove('visible');
    lbImg.src = "";
  };

  document.getElementById('lb-backdrop').onclick = () => {
    lb.classList.remove('visible');
    lbImg.src = "";
  };

})();
</script>
