<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Funtime Photography – Event Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
  --bg-a:#2b1a4a;
  --bg-b:#1b0f2e;
  --bg-c:#0d0617;
  --accent:#00e0ff;
  --panel:rgba(255,255,255,0.06);
  --text-main:#f5f5fa;
  --text-muted:rgba(245,245,250,0.6);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Montserrat,sans-serif;
  background:radial-gradient(circle at 20% 20%,var(--bg-a),var(--bg-b) 55%,var(--bg-c));
  color:var(--text-main);
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:14px 30px;
  background:rgba(10,6,23,0.75);
}

.topbar img{width:60px;border-radius:50%}

.topbar a{
  font-family:'Bebas Neue';
  color:white;
  text-decoration:none;
  margin-left:20px;
}

.container{
  max-width:1200px;
  margin:100px auto;
  padding:0 20px;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.filter-btn{
  padding:10px 14px;
  border-radius:8px;
  border:0;
  background:var(--panel);
  color:white;
  cursor:pointer;
}

.filter-btn.active{
  background:var(--accent);
  color:black;
}

.section{
  margin-bottom:40px;
}

.section-title{
  font-family:'Bebas Neue';
  margin-bottom:15px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
}

.thumb img{
  width:100%;
  border-radius:10px;
  height:250px;
  object-fit:cover;
  cursor:pointer;
  transition:0.3s;
}

.thumb img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox.active{display:flex}

.lightbox img{
  max-width:90%;
  max-height:85vh;
  border-radius:10px;
}

</style>
</head>

<body>

<header class="topbar">
<img src="logo.png">
<div>
<a href="index.html">Home</a>
<a href="#contact">Contact</a>
</div>
</header>

<main class="container">

<div class="controls">
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="rawfest">RAWfest</button>
<button class="filter-btn" data-filter="dedbest">Dedbest</button>
<button class="filter-btn" data-filter="taco">Taco Night</button>
</div>

<div id="eventsContainer"></div>

</main>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>
(function(){

const events = [
  { id:'rawfest', name:'RAWfest', from:1, to:50 },
  { id:'dedbest', name:'Dedbest / Elsewhere', from:74, to:134 },
  { id:'taco', name:'Taco Night', from:135, to:243 }
];

const container = document.getElementById('eventsContainer');

const sections = {};

// ✅ Create sections (empty at first)
events.forEach(ev=>{
  const section = document.createElement('div');
  section.className = 'section';
  section.dataset.event = ev.id;

  section.innerHTML = `
    <div class="section-title">${ev.name}</div>
    <div class="gallery"></div>
  `;

  container.appendChild(section);
  sections[ev.id] = { el:section, ev, loaded:0 };
});

// ✅ LOAD IMAGES IN CHUNKS
function loadMore(sectionObj){

  const {ev} = sectionObj;
  const gallery = sectionObj.el.querySelector('.gallery');

  const batchSize = 12;

  for(let i=0;i<batchSize;i++){

    const index = ev.from + sectionObj.loaded;

    if(index > ev.to) return;

    const img = document.createElement('img');
    img.src = `photo${index}.jpg`;
    img.loading = "lazy";

    const wrap = document.createElement('div');
    wrap.className = "thumb";
    wrap.appendChild(img);

    gallery.appendChild(wrap);

    sectionObj.loaded++;
  }
}

// ✅ INTERSECTION OBSERVER (loads when visible)
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const section = sections[entry.target.dataset.event];
      loadMore(section);
    }
  });
},{threshold:0.2});

// Observe sections
Object.values(sections).forEach(s=>{
  observer.observe(s.el);
});

// ✅ Load more on scroll inside section
window.addEventListener('scroll', ()=>{
  Object.values(sections).forEach(s=>{
    if(s.loaded < (s.ev.to - s.ev.from)){
      const rect = s.el.getBoundingClientRect();
      if(rect.bottom < window.innerHeight + 200){
        loadMore(s);
      }
    }
  });
});

// FILTERS
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const f = btn.dataset.filter;

    Object.values(sections).forEach(s=>{
      s.el.style.display = (f==='all'||s.ev.id===f) ? '' : 'none';
    });
  };
});

// LIGHTBOX
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');

document.addEventListener('click', e=>{
  const img = e.target.closest('.thumb img');
  if(!img) return;

  lbImg.src = img.src;
  lb.classList.add('active');
});

lb.onclick = ()=>lb.classList.remove('active');

})();
</script>

</body>
</html>
``
