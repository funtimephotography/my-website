<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Funtime Photography – Event Gallery</title>
<meta name="description" content="Browse Funtime Photography's event gallery featuring RAWfest, Dedbest, and Taco Night events.">
<meta property="og:title" content="Funtime Photography – Event Gallery">
<meta property="og:description" content="Browse professional event photography from Funtime Photography">
<meta property="og:type" content="website">

<link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Bebas+Neue&display=swap" as="style">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0d0617;
  --bg2:#2b1a4a;
  --accent:#00e0ff;
  --text:#f5f5fa;
  --muted:rgba(255,255,255,0.75);
  --panel:rgba(255,255,255,0.04);
}

*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body{
  font-family:Montserrat,sans-serif;
  background:radial-gradient(circle at 20% 20%, #2b1a4a, #1b0f2e 60%, #0d0617);
  color:var(--text);
  min-height:100vh;
}

/* NAV — identical to homepage */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:999;
}

.topbar img{
  width:60px;height:60px;border-radius:50%;
}

.topbar nav{
  display:flex;gap:20px;
}

.topbar a{
  color:white;
  text-decoration:none;
  font-family:'Bebas Neue';
  transition:color 0.2s;
}

.topbar a:hover{color:var(--accent);}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:0 auto;
  padding:100px 20px 60px;
}

/* PAGE TITLE */
.page-title{
  font-family:'Bebas Neue';
  font-size:clamp(32px,6vw,56px);
  text-align:center;
  margin-bottom:40px;
  letter-spacing:1px;
}

/* TILES NAV */
.tiles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom:40px;
}

.tile{
  height:140px;
  border-radius:14px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:flex-end;
  padding:15px;
  transition:.3s;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,224,255,0.15);
  background-color:var(--panel);
}

.tile::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
  transition:.3s;
}

.tile:hover::before{
  background:rgba(0,0,0,0.25);
}

.tile:hover{
  border-color:rgba(0,224,255,0.5);
  box-shadow:0 0 16px rgba(0,224,255,0.2);
  transform:translateY(-2px);
}

.tile:focus{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

.tile span{
  font-family:'Bebas Neue';
  font-size:28px;
  position:relative;
  z-index:2;
  color:var(--text);
}

.tile.active{
  border-color:var(--accent);
  box-shadow:
    0 0 12px rgba(0,224,255,0.5),
    0 0 30px rgba(0,224,255,0.2),
    inset 0 0 12px rgba(0,224,255,0.1);
}

.tile.coming-soon{
  cursor:not-allowed;
  opacity:0.6;
}

.tile.coming-soon:hover::before{
  background:rgba(0,0,0,0.5);
}

.tile.coming-soon:hover{
  border-color:rgba(0,224,255,0.15);
  box-shadow:none;
  transform:none;
}

.coming-soon-badge{
  position:absolute;
  top:8px;right:8px;
  background:rgba(255,165,0,0.9);
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  z-index:3;
  letter-spacing:0.5px;
}

/* SECTION */
.section{
  display:none;
  opacity:0;
  transform:translateY(20px);
  transition:opacity .4s ease, transform .4s ease;
}

.section.active{
  display:block;
}

.section.visible{
  opacity:1;
  transform:translateY(0);
}

/* SECTION HEADER */
.section-header{
  height:200px;
  width:100%;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
  display:flex;
  align-items:flex-end;
  padding:24px;
  position:relative;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(255,255,255,0.08);
}

.section-header::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.2) 100%);
}

.section-header h2{
  font-family:'Bebas Neue';
  font-size:clamp(32px,5vw,48px);
  position:relative;
  z-index:2;
  letter-spacing:1px;
}

/* COMING SOON NOTICE */
.coming-soon-notice{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:400px;
  gap:20px;
  text-align:center;
}

.coming-soon-icon{
  font-size:64px;
  color:var(--accent);
  opacity:0.8;
}

.coming-soon-notice h3{
  font-family:'Bebas Neue';
  font-size:32px;
  letter-spacing:1px;
  color:var(--text);
}

.coming-soon-notice p{
  color:var(--muted);
  font-size:16px;
  max-width:500px;
  line-height:1.6;
}

/* GRID */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:10px;
}

.thumb{
  position:relative;
  overflow:hidden;
  border-radius:10px;
  aspect-ratio:1;
  background:rgba(255,255,255,0.04);
}

.thumb img{
  width:100%;height:100%;
  object-fit:cover;
  cursor:pointer;
  display:block;
  opacity:0;
  transform:translateY(10px);
  transition:opacity .4s ease, transform .4s ease, scale .25s ease;
}

.thumb img.loaded{
  opacity:1;
  transform:translateY(0);
}

.thumb img:hover{
  scale:1.04;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
  z-index:1000;
}

.lightbox.active{
  display:flex;
}

.lightbox img{
  max-width:90%;
  max-height:75vh;
  border-radius:8px;
  object-fit:contain;
}

.lightbox-controls{
  display:flex;
  gap:15px;
  justify-content:center;
  align-items:center;
  color:white;
}

.lightbox-btn{
  background:rgba(255,255,255,0.15);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
  font-family:Montserrat,sans-serif;
  transition:background 0.2s;
}

.lightbox-btn:hover{
  background:rgba(0,224,255,0.3);
}

.lightbox-close{
  position:absolute;
  top:20px;right:20px;
  background:rgba(255,255,255,0.15);
  border:none;
  color:white;
  width:40px;height:40px;
  border-radius:50%;
  cursor:pointer;
  font-size:22px;
  transition:background 0.2s;
  display:flex;align-items:center;justify-content:center;
}

.lightbox-close:hover{
  background:rgba(255,0,0,0.35);
}

#lb-counter{
  font-size:14px;
  color:var(--muted);
  min-width:60px;
  text-align:center;
}

/* FOOTER — identical to homepage */
footer{
  padding:60px 20px;
  background:black;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:40px;
  margin-top:80px;
}

.neon-contact{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.neon-contact a{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 22px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  font-weight:600;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,224,255,0.3);
  transition:all 0.25s ease;
}

.neon-contact i{
  font-size:18px;
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.neon-contact a:hover{
  transform:translateY(-2px);
  border-color:#00e0ff;
  box-shadow:
    0 0 10px rgba(0,224,255,0.6),
    0 0 25px rgba(0,224,255,0.4),
    inset 0 0 10px rgba(0,224,255,0.2);
}

.gallery-prompt{
  text-align:center;
  color:var(--muted);
  font-size:15px;
  margin-bottom:40px;
  transition:opacity 0.3s;
}

.gallery-prompt.hidden{
  opacity:0;
  pointer-events:none;
}

/* MOBILE */
@media(max-width:800px){
  .topbar{padding:12px 20px;}
  .topbar img{width:50px;height:50px;}

  .tiles{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }

  .tile{height:110px;}
  .tile span{font-size:22px;}

  .coming-soon-badge{
    font-size:11px;
    padding:5px 10px;
  }

  .section-header{height:140px;}

  .gallery{
    grid-template-columns:repeat(2,1fr);
    gap:8px;
  }

  .coming-soon-notice{
    min-height:300px;
  }

  .coming-soon-icon{
    font-size:48px;
  }

  .coming-soon-notice h3{
    font-size:24px;
  }

  footer{
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:24px;
    padding:40px 20px;
  }

  .neon-contact{gap:12px;}

  .neon-contact a{
    padding:10px 16px;
    font-size:14px;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <img src="/logo.png" alt="Funtime Photography logo">
  <nav>
    <a href="/index.html">Home</a>
    <a href="/booking.html">Book</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<main class="container">

  <h1 class="page-title">Event Gallery</h1>

  <div class="tiles" id="tiles"></div>

  <p class="gallery-prompt" id="galleryPrompt">Select an event above to browse the photos</p>

  <div id="eventsContainer"></div>

</main>

<footer id="contact">
  <div class="neon-contact">
    <a href="mailto:events@funtimephotography.co.uk">
      <i class="fa-solid fa-envelope"></i>
      <span>Email</span>
    </a>
    <a href="tel:+447834350911">
      <i class="fa-solid fa-phone"></i>
      <span>Call</span>
    </a>
    <a href="https://wa.me/447834350911" target="_blank">
      <i class="fa-brands fa-whatsapp"></i>
      <span>WhatsApp</span>
    </a>
    <a href="https://www.instagram.com/funtimephotography.co.uk/" target="_blank">
      <i class="fa-brands fa-instagram"></i>
      <span>Instagram</span>
    </a>
  </div>
  <div class="footer-bottom">© 2026 Funtime Photography</div>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox-close" id="lb-close" aria-label="Close lightbox">&times;</button>
  <img id="lb-img" alt="Full size event photo">
  <div class="lightbox-controls">
    <button class="lightbox-btn" id="lb-prev" aria-label="Previous image">← Prev</button>
    <span id="lb-counter"></span>
    <button class="lightbox-btn" id="lb-next" aria-label="Next image">Next →</button>
  </div>
</div>

<script>
(function(){

const BATCH_SIZE = 12;
const IMAGE_BASE_PATH = '/';

const events = [
  {
    id: 'rawfest',
    name: 'RAWfest',
    comingSoon: false,
    photos: ['photo1.jpg','photo3.jpg','photo4.jpg','photo7.jpg','photo14.jpg','photo15.jpg','photo17.jpg','photo22.jpg','photo26.jpg','photo29.jpg','photo32.jpg','photo36.jpg','photo39.jpg','photo41.jpg','photo45.jpg','photo48.jpg','photo51.jpg','photo52.jpg','photo54.jpg','photo56.jpg']
  },
  {
    id: 'dedbest',
    name: 'Dedbest',
    comingSoon: false,
    photos: ['photo95.jpg','photo97.jpg','photo76.jpg','photo83.jpg','photo79.jpg','photo80.jpg','photo86.jpg','photo85.jpg','photo104.jpg','photo113.jpg','photo106.jpg','photo123.jpg','photo91.jpg','photo88.jpg','photo100.jpg','photo110.jpg','photo115.jpg','photo120.jpg','photo125.jpg','photo130.jpg']
  },
  {
    id: 'taco',
    name: 'Taco Night',
    comingSoon: false,
    photos: ['photo135.jpg','photo136.jpg','photo139.jpg','photo144.jpg','photo156.jpg','photo155.jpg','photo179.jpg','photo191.jpg','photo192.jpg','photo193.jpg','photo198.jpg','photo196.jpg','photo200.jpg','photo205.jpg','photo210.jpg','photo215.jpg','photo220.jpg','photo225.jpg','photo230.jpg','photo235.jpg']
  },
  {
    id: 'elsewhere',
    name: 'Elsewhere Launch',
    comingSoon: true,
    photos: []
  },
  {
    id: 'forest-row',
    name: 'Forest Row Festival',
    comingSoon: true,
    photos: []
  },
  {
    id: 'elemental',
    name: 'Elemental Festival',
    comingSoon: false,
    photos: ['24-DSC_0332.jpg','25-DSC_0338.jpg','17-DSC_5937.jpg','18-DSC_0284.jpg','20-DSC_6042.jpg','22-DSC_6137.jpg','7-DSC_0143.jpg','8-DSC_5705.jpg','9-DSC_0165.jpg','10-DSC_5740.jpg','11-DSC_5746.jpg','12-DSC_5817.jpg','13-DSC_0233.jpg','14-DSC_5835.jpg','15-DSC_5846.jpg','2-DSC_5414.jpg','3-DSC_5448.jpg','4-DSC_0093.jpg','5-DSC_5595.jpg','6-DSC_5632.jpg']
  }
];

const container   = document.getElementById('eventsContainer');
const tilesWrap   = document.getElementById('tiles');
const lb          = document.getElementById('lightbox');
const lbImg       = document.getElementById('lb-img');
const lbCounter   = document.getElementById('lb-counter');
const lbPrev      = document.getElementById('lb-prev');
const lbNext      = document.getElementById('lb-next');
const lbClose     = document.getElementById('lb-close');

const galleryPrompt = document.getElementById('galleryPrompt');

const sections = {};

// Track all loaded images for lightbox navigation, per active gallery
let activeSectionId = null;
let lbImages = [];
let lbIndex  = 0;

/* BUILD TILES + SECTIONS */
events.forEach(ev => {

  // TILE
  const tile = document.createElement('button');
  tile.className = 'tile';
  if(ev.comingSoon) tile.classList.add('coming-soon');
  tile.setAttribute('data-event-id', ev.id);
  tile.setAttribute('aria-label', `View ${ev.name} gallery`);
  
  let tileHTML = `<span>${ev.name}</span>`;
  if(ev.comingSoon) tileHTML += `<div class="coming-soon-badge">Coming Soon</div>`;
  
  tile.innerHTML = tileHTML;
  if(ev.photos.length > 0) tile.style.backgroundImage = `url('${IMAGE_BASE_PATH}${ev.photos[0]}')`;
  tilesWrap.appendChild(tile);

  // SECTION
  const section = document.createElement('div');
  section.className = 'section';
  section.setAttribute('data-event-id', ev.id);
  
  let sectionHTML = `<div class="section-header"`;
  if(ev.photos.length > 0) sectionHTML += ` style="background-image:url('${IMAGE_BASE_PATH}${ev.photos[0]}')"`;
  sectionHTML += `><h2>${ev.name}</h2></div>`;
  
  if(ev.comingSoon){
    sectionHTML += `
      <div class="coming-soon-notice">
        <div class="coming-soon-icon">
          <i class="fa-solid fa-camera"></i>
        </div>
        <h3>Coming Soon</h3>
        <p>Photos from this event will be available shortly. Check back soon!</p>
      </div>
    `;
  } else {
    sectionHTML += `<div class="gallery" role="region" aria-label="${ev.name} photo gallery"></div>`;
  }
  
  section.innerHTML = sectionHTML;
  container.appendChild(section);

  sections[ev.id] = {
    el: section,
    tile: tile,
    ev: ev,
    loaded: 0,
    imgEls: []
  };

  if(!ev.comingSoon){
    tile.addEventListener('click', () => switchGallery(ev.id));
    tile.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); switchGallery(ev.id); }
    });
  }
});

/* SWITCH GALLERY */
function switchGallery(id){
  Object.values(sections).forEach(s => {
    s.el.classList.remove('active','visible');
    s.tile.classList.remove('active');
  });

  const s = sections[id];
  activeSectionId = id;
  s.el.classList.add('active');
  s.tile.classList.add('active');
  galleryPrompt.classList.add('hidden');

  // Trigger transition on next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => s.el.classList.add('visible'));
  });

  // Load first batch if not yet loaded and not coming soon
  if(!s.ev.comingSoon && s.loaded === 0) loadMore(s);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* LOAD IMAGES */
function loadMore(sectionObj){
  const { ev } = sectionObj;
  const gallery = sectionObj.el.querySelector('.gallery');

  for(let i = 0; i < BATCH_SIZE; i++){
    const photo = ev.photos[sectionObj.loaded];
    if(!photo) return;

    const img = new Image();
    img.src = `${IMAGE_BASE_PATH}${photo}`;
    img.alt = `${ev.name} – ${photo}`;
    img.loading = 'lazy';
    img.width = 250;
    img.height = 250;

    img.onload = () => img.classList.add('loaded');
    img.onerror = () => { if (wrap) wrap.style.display = 'none'; };

    img.dataset.galleryIndex = sectionObj.imgEls.length;
    sectionObj.imgEls.push(img);

    const wrap = document.createElement('div');
    wrap.className = 'thumb';
    wrap.appendChild(img);
    gallery.appendChild(wrap);

    sectionObj.loaded++;
  }
}

/* INFINITE SCROLL via IntersectionObserver */
const loadObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(!entry.isIntersecting) return;
    const sectionObj = Object.values(sections).find(s => s.el === entry.target);
    if(sectionObj && !sectionObj.ev.comingSoon && sectionObj.loaded < sectionObj.ev.photos.length){
      loadMore(sectionObj);
    }
  });
}, { threshold: 0.1 });

Object.values(sections).forEach(s => loadObserver.observe(s.el));

/* LIGHTBOX */
function openLightbox(sectionId, index){
  const s = sections[sectionId];
  lbImages = s.imgEls;
  lbIndex = index;
  showLbImage();
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function showLbImage(){
  lbImg.src = lbImages[lbIndex].src;
  lbImg.alt = lbImages[lbIndex].alt;
  lbCounter.textContent = `${lbIndex + 1} / ${lbImages.length}`;
}

function closeLightbox(){
  lb.classList.remove('active');
  document.body.style.overflow = '';
}

function showNext(){
  lbIndex = (lbIndex + 1) % lbImages.length;
  // load more if near end
  const s = sections[activeSectionId];
  if(lbIndex >= lbImages.length - 3) loadMore(s);
  showLbImage();
}

function showPrev(){
  lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
  showLbImage();
}

// Delegate click on gallery images
container.addEventListener('click', e => {
  const img = e.target.closest('.thumb img');
  if(!img) return;
  const idx = parseInt(img.dataset.galleryIndex, 10);
  openLightbox(activeSectionId, idx);
});

lbPrev.addEventListener('click', showPrev);
lbNext.addEventListener('click', showNext);
lbClose.addEventListener('click', closeLightbox);

lb.addEventListener('click', e => {
  if(e.target === lb) closeLightbox();
});

document.addEventListener('keydown', e => {
  if(!lb.classList.contains('active')) return;
  if(e.key === 'Escape')      closeLightbox();
  if(e.key === 'ArrowRight')  showNext();
  if(e.key === 'ArrowLeft')   showPrev();
});

/* No default — user picks a gallery to open */

})();
</script>

</body>
</html>
